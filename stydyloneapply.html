<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Study Loan - Apex Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Apex Commercial <span>Education Loans</span></div>
        <nav><a href="lone.html">Loan Center</a></nav>
    </header>

    <div class="container" style="max-width: 550px;">
        <h2>Higher Education / Study Loan</h2>
        <p style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem;">Submit course and institutional details for dynamic student credit authorization.</p>
        
        <form id="studyLoanForm">
            <div class="form-group">
                <label>Applicant Account Number</label>
                <input type="text" id="slAcc" readonly style="background: #f1f5f9; font-weight: bold; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>University / Institution Name</label>
                <input type="text" id="slCollege" placeholder="e.g. National Institute of Technology" required>
            </div>
            <div class="form-group">
                <label>Course / Program Name</label>
                <input type="text" id="slCourse" placeholder="e.g. B.Tech Computer Science" required>
            </div>
            <div class="form-group">
                <label>Required Tuition Fee Amount (Fake INR)</label>
                <input type="number" id="slAmount" placeholder="Enter academic credit amount" required>
            </div>
            <button type="submit" style="width: 100%; background-color: #8b5cf6;">Submit Study Loan File</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        const user = Session.getUser();
        if (!user || user.role !== 'customer') {
            alert('Authorized Customer session required.');
            window.location.href = 'login.html';
        } else {
            document.getElementById('slAcc').value = user.accountNo;
        }

        document.getElementById('studyLoanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const accNum = user.accountNo;
            const amount = parseFloat(document.getElementById('slAmount').value);
            const course = document.getElementById('slCourse').value.trim();
            const college = document.getElementById('slCollege').value.trim();

            let allLoans = getDB('loans') || [];

            // Save record to centralized simulated database array
            allLoans.push({
                accNum: accNum,
                type: `Study Loan (${course} - ${college})`,
                amount: amount,
                status: 'Pending',
                timestamp: new Date().toLocaleString()
            });

            setDB('loans', allLoans);
            alert(`🎉 Success: Academic Study Loan application for ₹${amount} logged!\nPending review from Branch Manager.`);
            window.location.href = 'lonestatus.html';
        });
    </script>
</body>
</html>
