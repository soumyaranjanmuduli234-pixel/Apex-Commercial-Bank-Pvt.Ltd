<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Car Loan - Apex Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Apex Commercial <span>Car Loans</span></div>
        <nav><a href="lone.html">Loan Center</a></nav>
    </header>

    <div class="container" style="max-width: 550px;">
        <h2>Vehicle & Car Loan Application</h2>
        <p style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem;">Fill out down target model dynamics to direct your credit statement files to management desks.</p>
        
        <form id="carLoanForm">
            <div class="form-group">
                <label>Applicant Account Number</label>
                <input type="text" id="clAcc" readonly style="background: #f1f5f9; font-weight: bold; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Car Model Name / Brand</label>
                <input type="text" id="clModel" placeholder="e.g. SUV Pro / Sedan" required>
            </div>
            <div class="form-group">
                <label>Loan Request Amount (Fake INR)</label>
                <input type="number" id="clAmount" placeholder="Enter vehicle credit amount" required>
            </div>
            <button type="submit" style="width: 100%; background-color: #ea580c;">Submit Car Loan Request</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        const user = Session.getUser();
        if (!user || user.role !== 'customer') {
            alert('Authorized Customer session required.');
            window.location.href = 'login.html';
        } else {
            document.getElementById('clAcc').value = user.accountNo;
        }

        document.getElementById('carLoanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const accNum = user.accountNo;
            const amount = parseFloat(document.getElementById('clAmount').value);
            const model = document.getElementById('clModel').value.trim();

            let allLoans = getDB('loans') || [];

            // Add into dynamic central engine arrays
            allLoans.push({
                accNum: accNum,
                type: `Car Loan (${model})`,
                amount: amount,
                status: 'Pending',
                timestamp: new Date().toLocaleString()
            });

            setDB('loans', allLoans);
            alert(`🎉 Success: Automobile Loan application for ₹${amount} logged!\nPending review from Bank Manager.`);
            window.location.href = 'lonestatus.html';
        });
    </script>
</body>
</html>
