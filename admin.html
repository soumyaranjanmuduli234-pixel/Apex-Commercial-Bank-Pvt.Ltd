<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Bank - Executive Admin Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Apex Security <span>Master Admin Desk</span></div>
        <button class="btn-danger" onclick="Session.logout()">Exit Terminal</button>
    </header>

    <div class="container">
        <!-- ================= NEW FEATURE: MASTER VAULT LIVE INSIGHTS METRIC TICKER ================= -->
        <div class="dashboard-grid" style="margin-bottom: 2.5rem;">
            <div class="glass-panel" style="background: linear-gradient(135deg, #1e3a8a 0%, #0d9488 100%); color: white; padding: 1.5rem 2rem;">
                <span style="font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; display:block; opacity:0.85;">Total Active Banking Ledgers</span>
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-top: 5px;" id="adminTotalAccounts">0 Profiles</h1>
            </div>
            <div class="glass-panel" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 1.5rem 2rem;">
                <span style="font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; display:block; opacity:0.85;">Master Liquidity Pool Asset Vault</span>
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-top: 5px; color:#10b981;" id="adminTotalCash">₹0.00</h1>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Executive Management Node Provisions -->
            <div class="glass-panel">
                <h3>Authorize Branch Manager Profiles</h3>
                <form id="addManagerForm">
                    <div class="form-group"><label>Manager Official Username</label><input type="text" id="mName" required></div>
                    <div class="form-group"><label>Terminal Password Key</label><input type="password" id="mPass" required></div>
                    <button type="submit" style="width:100%; background-color:var(--accent);">Register Manager Credentials</button>
                </form>
            </div>
            <div class="glass-panel">
                <h3>Issued Executive Management Authority Ledger</h3>
                <ul id="managerList" style="list-style:none;"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const staff = Session.getUser();
        if(!staff || staff.role !== 'admin') window.location.href = 'login.html';

        function computeLiveSystemMetrics() {
            const accounts = getDB('bank_accounts') || {};
            const keys = Object.keys(accounts);
            
            let aggregatedVaultBalance = 0;
            keys.forEach(k => {
                aggregatedVaultBalance += parseFloat(accounts[k].balance || 0);
            });

            // Set live parameters directly on the top layouts card monitors
            document.getElementById('adminTotalAccounts').innerText = `${keys.length} Active Accounts`;
            document.getElementById('adminTotalCash').innerText = `An ₹${aggregatedVaultBalance.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        }

        function renderManagerRegistries() {
            const list = document.getElementById('managerList');
            list.innerHTML = '';
            let managers = getDB('managers') || [];
            
            if(managers.length === 0) {
                list.innerHTML = `<li style="color:#64748b; font-style:italic;">No corporate managers registered in local system tables.</li>`;
                return;
            }
            managers.forEach((m, index) => {
                list.innerHTML += `<li><span>👤 ${m.user}</span><button class="btn-danger" style="padding:2px 8px; font-size:0.75rem;" onclick="removeManager(${index})">Revoke Access</button></li>`;
            });
        }

        document.getElementById('addManagerForm').addEventListener('submit', function(e){
            e.preventDefault();
            const user = document.getElementById('mName').value.trim();
            const pass = document.getElementById('mPass').value;
            let managers = getDB('managers') || [];
            managers.push({ user: user, pass: pass, role: 'manager' });
            setDB('managers', managers);
            showGlassToast('Manager profile index authorized successfully.', 'success');
            this.reset();
            renderManagerRegistries();
        });

        window.removeManager = function(idx) {
            let m = getDB('managers') || []; m.splice(idx, 1); setDB('managers', m);
            showGlassToast('Access key revoked.', 'success'); renderManagerRegistries();
        };

        // Run monitors updates dynamically on loop load
        computeLiveSystemMetrics();
        renderManagerRegistries();
    </script>
</body>
</html>
