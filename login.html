<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Secure Login - Apex Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Apex Commercial <span>Secure Gate</span></div>
        <nav><a href="index.html">Main Site Home</a></nav>
    </header>

    <div class="container" style="max-width: 450px; margin-top: 4rem;">
        <h2>Online Banking Portal Access</h2>
        <form id="preLoginForm">
            <div class="form-group"><label>Account Number ID</label><input type="text" id="logAcc" required></div>
            <div class="form-group"><label>Account Password</label><input type="password" id="logPass" required></div>
            <button type="submit" style="width: 100%;">Verify Credentials</button>
        </form>
    </div>

    <!-- Hidden Glassmorphic OTP Authentication Layer Container Modal -->
    <div id="otpPopupFrame" class="otp-modal-overlay" style="display: none;">
        <div class="otp-card-glass">
            <h3 style="color: var(--primary);">🔒 Dynamic MFA Verification</h3>
            <p style="font-size:0.9rem; color:var(--text-muted); margin: 0.5rem 0 1.5rem;">A mock secure 4-digit OTP has been emitted to your terminal lines. Enter code **`1234`** to clear access.</p>
            <div class="form-group">
                <label style="text-align:center;">Enter 4-Digit Security OTP</label>
                <input type="password" id="inputOtpCode" pattern="[0-9]{4}" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;" placeholder="••••" required>
            </div>
            <button type="button" style="width:100%;" onclick="validateOtpAuthToken()">Authorize Access Tokens</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let cachedAccountNo = null;
        let cachedAccountName = null;

        document.getElementById('preLoginForm').addEventListener('submit', function(e){
            e.preventDefault();
            const accNum = document.getElementById('logAcc').value.trim();
            const password = document.getElementById('logPass').value;

            let allAccounts = getDB('bank_accounts') || {};
            let match = allAccounts[accNum];

            if(match && match.password === password) {
                // Store globally until OTP clears auth loops
                cachedAccountNo = accNum;
                cachedAccountName = match.name;
                
                // Show dynamic OTP screen overlay
                document.getElementById('otpPopupFrame').style.display = 'flex';
            } else {
                alert('⚠️ Authentication Failed: Account credentials mismatched.');
            }
        });

        function validateOtpAuthToken() {
            const enteredOtp = document.getElementById('inputOtpCode').value;
            
            // Standard Validation verification pin code check
            if(enteredOtp === "1234") {
                Session.setUser(cachedAccountName, 'customer', cachedAccountNo);
                window.location.href = 'accountbalancecheck.html';
            } else {
                alert('❌ Invalid Verification Token: Handshake rejected.');
                document.getElementById('inputOtpCode').value = '';
            }
        }
    </script>
</body>
</html>
